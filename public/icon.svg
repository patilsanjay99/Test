<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b8a1c" />
      <stop offset="100%" stop-color="#05450e" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Subtle grid lines to simulate ledger sheets/accounting environment -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="2">
    <line x1="64" y1="128" x2="448" y2="128" />
    <line x1="64" y1="192" x2="448" y2="192" />
    <line x1="64" y1="256" x2="448" y2="256" />
    <line x1="64" y1="320" x2="448" y2="320" />
    <line x1="64" y1="384" x2="448" y2="384" />
    <line x1="128" y1="64" x2="128" y2="448" />
    <line x1="256" y1="64" x2="256" y2="448" />
    <line x1="384" y1="64" x2="384" y2="448" />
  </g>

  <!-- Financial growth bar charts in background -->
  <g fill="url(#barGrad)">
    <rect x="140" y="300" width="36" height="84" rx="6" />
    <rect x="196" y="240" width="36" height="144" rx="6" />
    <rect x="252" y="180" width="36" height="204" rx="6" />
    <rect x="308" y="130" width="36" height="254" rx="6" />
  </g>

  <!-- Elegant Farmer Producer Company Leaf Concept (Forefront) -->
  <!-- Left Side Leaf -->
  <path d="M 256,384 C 180,380 120,300 120,220 C 120,160 180,100 256,128" fill="url(#leafGrad)" opacity="0.95" />
  <!-- Right Side Leaf -->
  <path d="M 256,384 C 332,380 392,300 392,220 C 392,160 332,100 256,128" fill="url(#leafGrad)" opacity="0.85" />

  <!-- Leaf center vein representing growing ledger/accounting line -->
  <path d="M 256,384 L 256,128" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  <path d="M 256,320 C 220,300 200,260 190,240" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <path d="M 256,260 C 290,240 310,200 320,180" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <!-- Outer Ring Accent -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="8" />
</svg>
